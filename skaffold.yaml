apiVersion: skaffold/v4beta11
kind: Config
build:
  artifacts:
    - image: harbor.tuxgrid.com/platform/cedar-sidecar
manifests:
  kustomize:
    paths:
      - k8s/
    buildArgs:
      - --load-restrictor=LoadRestrictionsNone
deploy:
  kubectl: {}
profiles:
  - name: dev
    manifests:
      kustomize:
        paths:
          - k8s/
        buildArgs:
          - --load-restrictor=LoadRestrictionsNone
