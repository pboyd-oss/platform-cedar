apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-cedar-sidecar
  namespace: platform
  labels:
    app: platform-cedar-sidecar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-cedar-sidecar
  template:
    metadata:
      labels:
        app: platform-cedar-sidecar
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cedar-sidecar
          image: harbor.tuxgrid.com/platform/cedar-sidecar:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CEDAR_POLICY_DIR
              value: /policies
            - name: LISTEN_ADDR
              value: :8080
            - name: ALERTMANAGER_URL
              value: "http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: cedar-policies
              mountPath: /policies
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: cedar-policies
          configMap:
            name: cedar-policies
