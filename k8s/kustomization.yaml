apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - httproute.yaml
configMapGenerator:
  - name: cedar-policies
    files:
      - ../policies/attest-gate.cedar
      - ../policies/promote-gate.cedar
      - ../policies/audit-gap.cedar
      - ../policies/token-gate.cedar
generatorOptions:
  disableNameSuffixHash: true
